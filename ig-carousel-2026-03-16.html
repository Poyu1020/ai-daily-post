<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG Carousel — AI 日報 2026/03/16</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e8e8;
    font-family: 'Noto Sans TC', sans-serif;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 32px;
    padding: 40px 24px;
  }

  .slide {
    width: 540px;
    height: 675px;
    background: #ffffff;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  }

  .cover {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px 44px;
    height: 100%;
  }
